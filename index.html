<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#C8102E">
<title>Ferry Viteoca</title>
<!-- Preconnect al webhook para reducir latencia DNS+TCP+TLS en el envío -->
<link rel="preconnect" href="https://ferry50.app.n8n.cloud">
<script src="https://telegram.org/js/telegram-web-app.js" defer></script>
<style>
/* Reset mínimo — sin wildcard costoso */
html,body,div,span,button,input{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f8f8f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow-x:hidden}

:root{
  --red:#C8102E;--red-d:#a00d24;--red-l:#e8143a;
  --green:#006B3F;
  --text:#1a1a1a;--muted:#888;
}

/* HEADER — gradiente como variable para evitar recalculo */
.hdr{
  background:linear-gradient(135deg,#1a0008 0%,#C8102E 60%,#a00d24 100%);
  padding:20px 16px 16px;text-align:center;
  /* will-change evita repaint en animación */
  will-change:transform,opacity;
  /* overflow:hidden para los pseudo-elementos */
  overflow:hidden;position:relative;
}
.hdr::before{
  content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;background:rgba(255,255,255,0.06);border-radius:50%;
  /* pointer-events:none elimina hit-testing innecesario */
  pointer-events:none;
}
.hdr::after{
  content:'';position:absolute;bottom:-20px;left:-20px;
  width:80px;height:80px;background:rgba(0,107,63,0.3);border-radius:50%;
  pointer-events:none;
}
.h-name{font-size:32px;font-weight:900;color:#ff4d6d;letter-spacing:3px;text-shadow:0 2px 8px rgba(0,0,0,.4);position:relative;z-index:1}
.h-sub{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-top:4px;position:relative;z-index:1}
.h-line{width:40px;height:2px;background:#006B3F;margin:10px auto 0;border-radius:2px;position:relative;z-index:1}

.body{padding:16px 14px 24px}

/* LABEL DE SECCIÓN */
.lbl{
  font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:var(--red);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.lbl::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(200,16,46,.2),transparent)}

/* GRIDS — misma regla, reutilizada */
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}

/* BOTONES DESTINO */
.dbt{
  border:2px solid #ddd;border-radius:14px;background:#fff;
  padding:12px 6px;text-align:center;cursor:pointer;
  /* transition solo en propiedades que se cambian */
  transition:border-color .18s,background .18s,box-shadow .18s,transform .18s;
  position:relative;overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,.06);
  /* Fuerza capa compuesta para transform animado */
  will-change:transform;
}
.dbt .dn{font-size:13px;font-weight:700;color:var(--text)}
.dbt .dc{font-size:10px;color:var(--muted);margin-top:2px}
.dbt.sel{border-color:var(--red);background:linear-gradient(135deg,#fff5f7,#ffe0e6);box-shadow:0 4px 14px rgba(200,16,46,.25);transform:translateY(-2px)}
.dbt.sel .dn{color:var(--red)}
.dbt.sel::after{content:'✓';position:absolute;top:5px;right:7px;font-size:10px;font-weight:900;color:var(--red)}

/* BOTONES PRECIO */
.pbt{
  border:2px solid #ddd;border-radius:14px;background:#fff;
  padding:12px 6px;text-align:center;cursor:pointer;
  transition:border-color .18s,background .18s,box-shadow .18s,transform .18s;
  position:relative;overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,.06);
  will-change:transform;
}
.pa{font-size:15px;font-weight:900;color:var(--text);line-height:1}
.pf{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px}
.pt{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:6px;padding:3px 6px;border-radius:6px;display:inline-block}

.pbt.eco .pt{color:var(--green);background:rgba(0,107,63,.08)}
.pbt.eco.sel{border-color:var(--green);background:linear-gradient(135deg,#f0fff7,#d4f5e5);box-shadow:0 4px 14px rgba(0,107,63,.2);transform:translateY(-2px)}
.pbt.eco.sel .pa{color:var(--green)}

.pbt.biz .pt{color:var(--red);background:rgba(200,16,46,.08)}
.pbt.biz.sel{border-color:var(--red);background:linear-gradient(135deg,#fff5f7,#ffe0e6);box-shadow:0 4px 14px rgba(200,16,46,.2);transform:translateY(-2px)}
.pbt.biz.sel .pa{color:var(--red)}

.pbt.vip .pt{color:#b8860b;background:rgba(184,134,11,.08)}
.pbt.vip.sel{border-color:#b8860b;background:linear-gradient(135deg,#fffdf0,#fef3c0);box-shadow:0 4px 14px rgba(184,134,11,.2);transform:translateY(-2px)}
.pbt.vip.sel .pa{color:#b8860b}

.pbt.sel::after{content:'✓';position:absolute;top:5px;right:7px;font-size:10px;font-weight:900}
.pbt.eco.sel::after{color:var(--green)}
.pbt.biz.sel::after{color:var(--red)}
.pbt.vip.sel::after{color:#b8860b}

/* UPLOAD */
.upl{
  border:2px dashed rgba(200,16,46,.25);border-radius:16px;
  background:#fff;padding:24px 16px;text-align:center;
  cursor:pointer;transition:border-color .18s,background .18s;
  position:relative;margin-bottom:20px;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
.upl:active{border-color:var(--red);background:#fff5f7}
/* Input ocupa toda el área con opacidad 0 — sin JS extra para el click */
.upl input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.u-ico{font-size:34px;margin-bottom:8px}
.u-ttl{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px}
.u-sub{font-size:12px;color:var(--muted)}
.u-fmts{display:flex;justify-content:center;gap:6px;margin-top:10px}
.fmt{font-size:9px;letter-spacing:1px;text-transform:uppercase;background:#f0f0f0;border-radius:5px;padding:3px 7px;color:var(--muted)}

/* PREVIEW — hidden por defecto con display none (sin costo de layout) */
#pvbox{
  display:none;border-radius:16px;overflow:hidden;
  margin-bottom:20px;position:relative;
  box-shadow:0 4px 16px rgba(0,0,0,.1);
}
/* height fija evita reflow al cargar imagen */
#pvbox img{width:100%;height:160px;object-fit:cover;display:block}
.pvbar{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
  padding:12px;display:flex;align-items:center;justify-content:space-between;
}
.pvbar span{font-size:12px;color:#fff;font-weight:600}
.chg{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  color:#fff;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;
  font-family:inherit;
}

/* BOTÓN ENVIAR */
.sbtn{
  width:100%;padding:16px;
  background:linear-gradient(135deg,var(--red-l),var(--red-d));
  border:none;border-radius:16px;color:#fff;
  font-size:17px;font-weight:800;letter-spacing:1px;cursor:pointer;
  box-shadow:0 6px 20px rgba(200,16,46,.35);
  transition:transform .15s,box-shadow .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  /* Evita FOUC en Safari al deshabilitar */
  -webkit-appearance:none;
}
.sbtn:active{transform:scale(.97);box-shadow:0 3px 10px rgba(200,16,46,.3)}
.sbtn:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;transform:none}

/* ANIMACIONES — solo los hijos directos del body para reducir selectores */
@keyframes su{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.hdr{animation:su .28s ease both}
/* Usamos nth-child en rango para menor especificidad */
.body>*{animation:su .28s ease both}
.body>*:nth-child(1){animation-delay:.05s}
.body>*:nth-child(2){animation-delay:.1s}
.body>*:nth-child(3){animation-delay:.14s}
.body>*:nth-child(4){animation-delay:.18s}
.body>*:nth-child(5){animation-delay:.22s}
.body>*:nth-child(6){animation-delay:.26s}
.body>*:nth-child(7){animation-delay:.3s}

@keyframes fo{to{opacity:0;transform:scale(.95)}}
.closing{animation:fo .28s ease forwards}
</style>
</head>
<body>

<div class="hdr">
  <div class="h-name">FERRY VITEOCA</div>
  <div class="h-sub">Reserva tu billete</div>
  <div class="h-line"></div>
</div>

<div class="body">

  <div class="lbl">Destino</div>
  <div class="row3" id="dRow">
    <div class="dbt" data-val="Malabo">
      <div class="dn">Malabo</div><div class="dc">Bioko</div>
    </div>
    <div class="dbt" data-val="Bata">
      <div class="dn">Bata</div><div class="dc">Continente</div>
    </div>
    <div class="dbt" data-val="Annobón">
      <div class="dn">Annobón</div><div class="dc">Isla</div>
    </div>
  </div>

  <div class="lbl">Tarifa</div>
  <div class="row3" id="pRow">
    <div class="pbt eco" data-val="35000" data-label="Económico">
      <div class="pa">35.000</div><div class="pf">FCFA</div><div class="pt">Económico</div>
    </div>
    <div class="pbt biz" data-val="40000" data-label="Business">
      <div class="pa">40.000</div><div class="pf">FCFA</div><div class="pt">Business</div>
    </div>
    <div class="pbt vip" data-val="50000" data-label="VIP">
      <div class="pa">50.000</div><div class="pf">FCFA</div><div class="pt">VIP ★</div>
    </div>
  </div>

  <div class="lbl">Foto de Identidad</div>
  <div class="upl" id="upl">
    <!--
      capture="environment" → cámara trasera por defecto (mejor calidad para DNI)
      accept solo imágenes reales para acotar el picker y agilizar la subida
    -->
    <input type="file" id="photoInput" accept="image/jpeg,image/png,image/webp,application/pdf" capture="environment">
    <div class="u-ico">🪪</div>
    <div class="u-ttl">Adjuntar documento</div>
    <div class="u-sub">Toca para hacer foto o seleccionar</div>
    <div class="u-fmts">
      <span class="fmt">JPG</span><span class="fmt">PNG</span><span class="fmt">PDF</span>
    </div>
  </div>

  <div id="pvbox">
    <!-- decoding="async" libera el hilo principal mientras decodifica la imagen -->
    <img id="pvimg" src="" alt="DNI" decoding="async">
    <div class="pvbar">
      <span>✅ Documento adjuntado</span>
      <button class="chg" id="chgBtn">Cambiar</button>
    </div>
  </div>

  <button class="sbtn" id="sbtn">🚢 Confirmar Reserva</button>

</div>

<script>
(function(){
  /* ── Telegram init ── */
  var tg=window.Telegram&&window.Telegram.WebApp;
  if(tg){tg.ready();tg.expand();}

  /* ── Estado ── */
  var destino='',precio='',fotoFile=null,fotoB64='';

  /* ── Elementos cacheados (una sola búsqueda en el DOM) ── */
  var photoInput=document.getElementById('photoInput');
  var upl=document.getElementById('upl');
  var pvbox=document.getElementById('pvbox');
  var pvimg=document.getElementById('pvimg');
  var sbtn=document.getElementById('sbtn');

  /* ── Delegación de eventos: 1 listener por grupo en lugar de N inline ── */
  document.getElementById('dRow').addEventListener('click',function(e){
    var btn=e.target.closest('.dbt');
    if(!btn)return;
    document.querySelectorAll('.dbt').forEach(function(b){b.classList.remove('sel')});
    btn.classList.add('sel');
    destino=btn.dataset.val;
  });

  document.getElementById('pRow').addEventListener('click',function(e){
    var btn=e.target.closest('.pbt');
    if(!btn)return;
    document.querySelectorAll('.pbt').forEach(function(b){b.classList.remove('sel')});
    btn.classList.add('sel');
    precio=btn.dataset.val;
  });

  /* ── Foto: compresión antes de guardar el base64 ── */
  photoInput.addEventListener('change',function(){
    var file=this.files[0];
    if(!file)return;
    fotoFile=file;

    /*
      Estrategia de calidad:
      - Usamos Canvas para reescalar si la imagen supera 1600px de ancho.
        Esto recorta tamaño de payload (y tiempo de upload) sin pérdida visible
        en un DNI que se lee en pantalla pequeña.
      - Calidad JPEG 0.85: mantiene legibilidad de texto del DNI con ~60% menos peso.
    */
    var img=new Image();
    var objectUrl=URL.createObjectURL(file);
    img.onload=function(){
      URL.revokeObjectURL(objectUrl); // liberar memoria inmediatamente

      var MAX=1600,q=0.85;
      var w=img.naturalWidth,h=img.naturalHeight;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}

      var c=document.createElement('canvas');
      c.width=w;c.height=h;
      var ctx=c.getContext('2d');
      ctx.drawImage(img,0,0,w,h);

      // PDF se envía tal cual (no es imagen rasterizable con Canvas)
      var mime=file.type==='application/pdf'?'application/pdf':'image/jpeg';
      if(mime==='application/pdf'){
        // Para PDF leemos directo sin pasar por canvas
        var r2=new FileReader();
        r2.onload=function(ev){setPreview(ev.target.result);};
        r2.readAsDataURL(file);
      } else {
        fotoB64=c.toDataURL(mime,q);
        setPreview(fotoB64);
      }
    };
    img.src=objectUrl;
  });

  function setPreview(b64){
    fotoB64=b64;
    // Usar object URL en el preview para no duplicar datos en memoria (la img no necesita el b64)
    pvimg.src=b64;
    upl.style.display='none';
    pvbox.style.display='block';
  }

  document.getElementById('chgBtn').addEventListener('click',function(){
    fotoB64='';fotoFile=null;
    photoInput.value='';
    pvbox.style.display='none';
    upl.style.display='block';
  });

  /* ── Envío ── */
  sbtn.addEventListener('click',function(){
    if(!destino){alert('Selecciona un destino');return;}
    if(!precio){alert('Selecciona una tarifa');return;}
    if(!fotoFile){alert('Adjunta tu foto de identidad');return;}

    sbtn.disabled=true;
    sbtn.textContent='Enviando…';

    var uid=tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user;
    var chatId=uid?String(uid.id):'';
    var username=uid?(uid.username||uid.first_name||''):'';

    /*
      SOLUCIÓN CORS + n8n:
      - multipart/form-data en lugar de JSON → n8n lo recibe sin configuración extra
      - NO se pone Content-Type manualmente (el browser lo pone con el boundary correcto)
      - La foto se adjunta como Blob real, no como base64 string
        → n8n recibe un campo "foto" como archivo binario, más pequeño y más rápido
    */
    var fd=new FormData();
    fd.append('destino', destino);
    fd.append('precio',  precio);
    fd.append('chat_id', chatId);
    fd.append('username',username);

    // Convertir base64 a Blob para enviar como archivo real
    var b64data=fotoB64.split(',')[1];
    var mime=fotoFile.type||'image/jpeg';
    var bytes=atob(b64data);
    var arr=new Uint8Array(bytes.length);
    for(var i=0;i<bytes.length;i++){arr[i]=bytes.charCodeAt(i);}
    var blob=new Blob([arr],{type:mime});
    fd.append('foto', blob, fotoFile.name||'documento.jpg');

    var ac=new AbortController();
    var timer=setTimeout(function(){ac.abort();},30000);

    fetch('https://ferry50.app.n8n.cloud/webhook/920417b7-c4a7-4747-97e7-759441ee66fa',{
      method:'POST',
      body:fd,           // SIN headers → browser gestiona Content-Type+boundary
      signal:ac.signal
    })
    .then(function(res){
      clearTimeout(timer);
      // n8n devuelve 200 incluso en flujos simples; aceptamos 200-299
      if(res.status>=200&&res.status<300){
        document.body.classList.add('closing');
        setTimeout(function(){if(tg)tg.close();},320);
      } else {
        throw new Error('HTTP '+res.status);
      }
    })
    .catch(function(err){
      clearTimeout(timer);
      sbtn.disabled=false;
      sbtn.innerHTML='🚢 Confirmar Reserva';
      var msg=err.name==='AbortError'
        ?'⏱ Tiempo agotado. Verifica tu conexión e intenta de nuevo.'
        :'❌ Error: '+err.message+'\nInténtalo de nuevo.';
      alert(msg);
    });
  });

})(); // IIFE — sin variables globales contaminando window
</script>
</body>
</html>
